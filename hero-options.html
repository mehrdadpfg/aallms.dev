<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>aallms — hero options</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lib/colors_and_type.css">
<link rel="stylesheet" href="lib/kit.css">
<link rel="stylesheet" href="lib/hero.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-body); }
  .ic { color: currentColor; } .ic svg { display: block; }
  .frame { display: flex; align-items: center; justify-content: center; border-radius: var(--r-md); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="lib/parts.jsx"></script>
  <script type="text/babel" src="hero.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard, HERO_VARIANTS } = window;

    function Frame({ id, theme }) {
      const V = HERO_VARIANTS.find(v => v.id === id);
      const C = V.Comp;
      return (
        <div className="frame" data-theme={theme}
          style={{ width: V.w, height: V.h, background: theme === "dark" ? "var(--canvas-850)" : "var(--bg)" }}>
          <C />
        </div>
      );
    }

    const A = "·";
    function App() {
      return (
        <DesignCanvas>
          <DCSection id="dark" title="The nested model — on dark canvas" subtitle="Landing default. Transformer core, wrapped by LLM, Context + Prompt, and the Harness shell.">
            {HERO_VARIANTS.map((v, i) => (
              <DCArtboard key={v.id} id={"d-" + v.id} label={String.fromCharCode(65 + i) + " " + A + " " + v.name} width={v.w} height={v.h}>
                <Frame id={v.id} theme="dark" />
              </DCArtboard>
            ))}
          </DCSection>
          <DCSection id="light" title="Same three — on light paper" subtitle="For comparison: the editorial / study theme used on the reader pages.">
            {HERO_VARIANTS.map((v, i) => (
              <DCArtboard key={v.id} id={"l-" + v.id} label={String.fromCharCode(65 + i) + " " + A + " " + v.name} width={v.w} height={v.h}>
                <Frame id={v.id} theme="light" />
              </DCArtboard>
            ))}
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
