<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../lib/boot.js"></script>
<title>Vector databases — aallms.dev</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../lib/colors_and_type.css">
<link rel="stylesheet" href="../lib/kit.css">
<link rel="stylesheet" href="reader.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: var(--bg); color: var(--fg1); font-family: var(--font-body); }
  .ic { color: currentColor; display: inline-flex; } .ic svg { display: block; }

  /* ===== shared vector-space layout (adapted from context-engineering rag-*) ===== */
  .rag-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: var(--sp-5); align-items: stretch; }
  @media (max-width: 720px) { .rag-grid { grid-template-columns: 1fr; } }
  .rag-space { position: relative; aspect-ratio: 1 / 0.82; border: 1px solid var(--border); border-radius: var(--r-md); background: var(--surface-sunken);
    background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 14px 14px; overflow: hidden; }
  .rag-lines { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .rag-dot { position: absolute; width: 11px; height: 11px; border-radius: 50%; background: var(--rc); transform: translate(-50%, -50%);
    opacity: .42; transition: opacity var(--dur-3, .28s) var(--ease-standard), width var(--dur-3, .28s), height var(--dur-3, .28s), box-shadow var(--dur-3, .28s); box-shadow: 0 0 0 0 transparent; }
  .rag-dot.is-hit { opacity: 1; width: 14px; height: 14px; box-shadow: 0 0 0 4px color-mix(in srgb, var(--rc) 26%, transparent); }
  .rag-dot-lab { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); white-space: nowrap; font-family: var(--font-mono);
    font-size: 9.5px; color: var(--fg3); opacity: 0; transition: opacity var(--dur-3, .28s); pointer-events: none; }
  .rag-dot.is-hit .rag-dot-lab { opacity: 1; color: var(--fg2); }
  .rag-query { position: absolute; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #fff;
    display: grid; place-items: center; transform: translate(-50%, -50%); box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 28%, transparent);
    transition: box-shadow var(--dur-3, .28s) var(--ease-spring); z-index: 3; }
  .rag-window { display: flex; flex-direction: column; gap: 6px; border: 1px solid var(--border); border-radius: var(--r-md); background: var(--surface); padding: var(--sp-4); }
  .rag-window-h { margin: 0 0 2px; font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--fg3); }

  /* ===== STEP 01 · ingest pipeline ===== */
  .vdb-pipe { display: flex; align-items: stretch; gap: var(--sp-3); flex-wrap: wrap; }
  .vdb-pcol { display: flex; flex-direction: column; gap: 7px; min-width: 0; flex: 1 1 160px; }
  .vdb-pcol-h { margin: 0 0 2px; display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10px; letter-spacing: .07em; text-transform: uppercase; color: var(--fg3); }
  .vdb-pcol-h .ic { color: var(--fg2); }
  .vdb-item { font-size: 12px; color: var(--fg1); padding: 7px 9px; border-radius: var(--r-sm); background: var(--surface-sunken);
    border: 1px solid var(--border); border-left: 3px solid var(--vc); }
  .vdb-vec { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); padding: 7px 9px; border-radius: var(--r-sm);
    background: var(--surface-sunken); border: 1px dashed var(--border); min-height: 32px; display: flex; align-items: center; transition: all var(--dur-3) var(--ease-standard); }
  .vdb-vec.is-on { color: var(--fg2); border-style: solid; border-left: 3px solid var(--vc); }
  .vdb-vec code { font-family: var(--font-mono); }
  .vdb-vec-wait { color: var(--fg3); opacity: .6; }
  .vdb-arrow { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; align-self: center;
    font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .05em; text-transform: uppercase; color: var(--fg3); opacity: .5; transition: opacity var(--dur-2) var(--ease-standard); }
  .vdb-arrow.is-on { opacity: 1; color: var(--accent); }
  .vdb-db { flex: 1 1 200px; min-width: 0; border: 1px solid var(--border); border-radius: var(--r-md); background: var(--surface-sunken);
    padding: var(--sp-4); display: flex; flex-direction: column; gap: 7px; opacity: .55; transition: opacity var(--dur-3) var(--ease-standard); }
  .vdb-db.is-on { opacity: 1; border-color: var(--border-strong); }
  .vdb-db-rows { display: flex; flex-direction: column; gap: 5px; }
  .vdb-db-row { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 10.5px; color: var(--fg2);
    padding: 5px 8px; border-radius: var(--r-xs); background: var(--surface); border: 1px solid var(--border); }
  .vdb-db-id { color: var(--fg3); }
  .vdb-db-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--vc); flex: none; }
  .vdb-db-meta { color: var(--fg3); }
  .vdb-db-count { margin: 2px 0 0; font-family: var(--font-mono); font-size: 10px; color: var(--fg3); text-align: right; }

  /* ===== STEP 02 · similarity search ===== */
  .vdb-space { cursor: grab; touch-action: none; }
  .vdb-space:active { cursor: grabbing; }
  .vdb-query { cursor: grab; }
  .vdb-query.is-drag { cursor: grabbing; box-shadow: 0 0 0 7px color-mix(in srgb, var(--accent) 24%, transparent); }
  .vdb-hint { position: absolute; left: 8px; bottom: 8px; display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-mono);
    font-size: 9.5px; color: var(--fg3); background: color-mix(in srgb, var(--surface) 80%, transparent); padding: 3px 7px; border-radius: var(--r-pill); pointer-events: none; z-index: 2; }
  .vdb-scores { gap: 4px; }
  .vdb-score { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--fg3); padding: 5px 7px; border-radius: var(--r-sm);
    background: var(--surface-sunken); border-left: 3px solid var(--border-strong); transition: all var(--dur-2) var(--ease-standard); }
  .vdb-score.is-hit { color: var(--fg1); border-left-color: var(--vc); background: var(--surface); }
  .vdb-score-rank { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); width: 10px; flex: none; }
  .vdb-score.is-hit .vdb-score-rank { color: var(--accent); }
  .vdb-score-lab { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .vdb-score-bar { flex: 0 0 46px; height: 6px; border-radius: 999px; background: var(--fill); overflow: hidden; }
  .vdb-score-bar i { display: block; height: 100%; background: var(--vc); border-radius: 999px; transition: width var(--dur-3) var(--ease-standard); }
  .vdb-score-num { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg2); width: 30px; text-align: right; flex: none; }

  /* ===== STEP 03 · ANN tradeoff ===== */
  .vdb-ann { display: grid; grid-template-columns: 1fr 0.9fr; gap: var(--sp-5); align-items: stretch; }
  @media (max-width: 720px) { .vdb-ann { grid-template-columns: 1fr; } }
  .vdb-ann-field { position: relative; display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; padding: var(--sp-4) var(--sp-4) 34px;
    border: 1px solid var(--border); border-radius: var(--r-md); background: var(--surface-sunken); }
  .vdb-cell { aspect-ratio: 1; border-radius: 3px; transition: all var(--dur-2) var(--ease-standard); }
  .vdb-cell.is-probed { background: var(--accent); opacity: .9; }
  .vdb-cell.is-skipped { background: var(--fill); opacity: .5; }
  .vdb-ann-field.is-approx .vdb-cell.is-probed { box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 30%, transparent); }
  .vdb-ann-tag { position: absolute; left: 0; right: 0; bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 6px;
    font-family: var(--font-mono); font-size: 9.5px; color: var(--fg3); }
  .vdb-ann-tag .ic { color: var(--accent); }
  .vdb-readouts { display: flex; flex-direction: column; gap: var(--sp-3); }
  .vdb-stat { display: flex; flex-direction: column; gap: 1px; padding: var(--sp-3) var(--sp-4); border: 1px solid var(--border);
    border-radius: var(--r-md); background: var(--surface); }
  .vdb-stat-k { font-family: var(--font-mono); font-size: 10px; letter-spacing: .07em; text-transform: uppercase; color: var(--fg3); }
  .vdb-stat-v { font-size: 22px; font-weight: 600; color: var(--fg1); line-height: 1.15; font-variant-numeric: tabular-nums; }
  .vdb-stat-sub { font-size: 11px; color: var(--fg3); }

  /* ===== STEP 04 · knowledge base ===== */
  .vdb-filters { display: flex; align-items: center; gap: var(--sp-4); flex-wrap: wrap; margin-bottom: var(--sp-5); }
  .vdb-toggle { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-body); font-size: 12.5px; font-weight: 600;
    padding: 6px 12px; border-radius: var(--r-pill); border: 1px solid var(--border-strong); background: var(--surface); color: var(--fg2);
    cursor: pointer; transition: all var(--dur-1) var(--ease-standard); }
  .vdb-toggle .ic { color: var(--fg3); }
  .vdb-toggle.on { color: var(--accent); border-color: var(--accent); background: var(--accent-tint); }
  .vdb-toggle.on .ic { color: var(--accent); }
  .vdb-kb { display: grid; grid-template-columns: 1.15fr 1fr; gap: var(--sp-5); align-items: stretch; }
  @media (max-width: 720px) { .vdb-kb { grid-template-columns: 1fr; } }
  .vdb-kb-col { display: flex; flex-direction: column; gap: 8px; }
  .vdb-kb-list, .vdb-kb-results { display: flex; flex-direction: column; gap: 5px; }
  .vdb-kb-row { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--fg1); padding: 7px 9px; border-radius: var(--r-sm);
    background: var(--surface-sunken); border: 1px solid var(--border); transition: all var(--dur-2) var(--ease-standard); }
  .vdb-kb-row.is-out { opacity: .38; }
  .vdb-kb-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--vc); flex: none; }
  .vdb-kb-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .vdb-kb-tags { display: inline-flex; gap: 4px; flex: none; }
  .vdb-tag { font-family: var(--font-mono); font-size: 9px; color: var(--fg3); background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r-pill); padding: 2px 6px; }
  .vdb-kb-x { display: inline-flex; color: var(--err-500); flex: none; }
  .vdb-kb-count, .vdb-kb-note { margin: 2px 0 0; font-family: var(--font-mono); font-size: 10px; color: var(--fg3); }
  .vdb-kb-note b { color: var(--fg2); }
  .vdb-kb-results { border: 1px solid var(--border); border-radius: var(--r-md); background: var(--surface); padding: var(--sp-3); }
  .vdb-kb-hit { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--fg1); padding: 6px 8px; border-radius: var(--r-sm);
    background: var(--surface-sunken); border-left: 3px solid var(--vc); }
  .vdb-kb-empty { font-family: var(--font-mono); font-size: 11px; color: var(--fg3); padding: 8px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="text/babel" src="../lib/parts.jsx"></script>
  <script type="text/babel" src="reader.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="refs.jsx"></script>
  <script type="text/babel" src="../lib/diagrams.jsx"></script>
  <script type="text/babel" src="vector-databases.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById("root")).render(
      <StepReader chapter={VECTORDB_CH} section={SEC_CONTEXT} />
    );
  </script>
</body>
</html>
