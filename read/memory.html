<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../lib/boot.js"></script>
<title>Memory — aallms.dev</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../lib/colors_and_type.css">
<link rel="stylesheet" href="../lib/kit.css">
<link rel="stylesheet" href="reader.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: var(--bg); color: var(--fg1); font-family: var(--font-body); }
  .ic { color: currentColor; display: inline-flex; } .ic svg { display: block; }

  /* ---- shared with the memory seed (copied from context-engineering.html) ---- */
  .mem-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-5); }
  @media (max-width: 720px) { .mem-grid { grid-template-columns: 1fr; } }
  .mem-col { display: flex; flex-direction: column; gap: 8px; }
  .mem-col-h { margin: 0; display: flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 10px; letter-spacing: .07em; text-transform: uppercase; color: var(--fg3); }
  .mem-col-h .ic { color: var(--fg2); }
  .mem-small { text-transform: none; letter-spacing: 0; color: var(--fg3); opacity: .8; }
  .mem-window { border: 1px solid var(--border); border-radius: var(--r-md); background: var(--surface); padding: var(--sp-4); display: flex; flex-direction: column; gap: 8px; min-height: 120px; }
  .mem-turn-user { font-size: 13px; color: var(--fg1); line-height: 1.5; }
  .mem-pull { display: inline-flex; align-items: center; gap: 6px; align-self: flex-start; font-family: var(--font-mono); font-size: 10.5px;
    color: var(--accent); background: var(--accent-tint); border-radius: var(--r-sm); padding: 4px 8px; }
  .mem-store { border: 1px solid var(--border); border-radius: var(--r-md); background: var(--surface-sunken); padding: var(--sp-4); display: flex; flex-direction: column; gap: 6px; min-height: 120px; }
  .mem-fact { display: inline-flex; align-items: center; gap: 7px; align-self: flex-start; font-family: var(--font-mono); font-size: 11.5px;
    color: var(--fg1); background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 5px 9px; transition: all var(--dur-3, .28s) var(--ease-standard); }
  .mem-fact .ic { color: var(--ok-500); }
  .mem-fact.is-new { border-color: var(--ok-500); background: var(--ok-tint); color: var(--fg1); }
  .mem-fact.is-read { border-color: var(--accent); background: var(--accent-tint); }
  .mem-fact.is-read .ic { color: var(--accent); }
  .mem-empty { font-family: var(--font-mono); font-size: 11px; color: var(--fg3); }
  .mem-meter-lab { font-family: var(--font-mono); font-size: 11px; color: var(--fg2); }

  /* ---- STEP 01 · why memory (transcript vs window) ---- */
  .mw-rows { display: flex; flex-direction: column; gap: var(--sp-4); }
  .mw-row { display: flex; flex-direction: column; gap: 7px; }
  .mw-row-h { margin: 0; display: flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 10px; letter-spacing: .07em; text-transform: uppercase; color: var(--fg3); }
  .mw-row-h .ic { color: var(--fg2); }
  .mw-track { display: flex; flex-wrap: wrap; gap: 5px; }
  .mw-track--fixed { padding: 6px; border: 1px dashed var(--border-strong); border-radius: var(--r-md); background: var(--surface-sunken); }
  .mw-cell { width: 30px; height: 30px; display: grid; place-items: center; border-radius: var(--r-sm);
    font-family: var(--font-mono); font-size: 11px; border: 1px solid var(--border); background: var(--surface); color: var(--fg2);
    transition: all var(--dur-3, .28s) var(--ease-standard); }
  .mw-cell.is-gone { opacity: .28; border-style: dashed; color: var(--fg3); text-decoration: line-through; }
  .mw-cell.is-in { border-color: var(--accent); background: var(--accent-tint); color: var(--fg1); }
  .mw-cell.is-empty { border-style: dashed; background: transparent; color: transparent; }
  .mw-note { display: inline-flex; align-items: center; gap: 7px; align-self: flex-start; font-family: var(--font-mono); font-size: 11px;
    color: var(--warn-500); background: var(--warn-tint); border-radius: var(--r-sm); padding: 5px 9px; }
  .mw-note b { color: var(--fg1); }
  .mw-note--ok { color: var(--ok-500); background: var(--ok-tint); }

  /* ---- STEP 02 · short-term vs long-term ---- */
  .sl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-5); }
  @media (max-width: 720px) { .sl-grid { grid-template-columns: 1fr; } }
  .sl-bin { display: flex; flex-direction: column; gap: 8px; }
  .sl-bin-h { margin: 0; display: flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 11px; color: var(--fg2); }
  .sl-bin-h .ic { color: var(--accent); }
  .sl-bin-h .mem-small { margin-left: auto; font-size: 10px; }
  .sl-bin-body { flex: 1; min-height: 120px; display: flex; flex-direction: column; gap: 6px; align-items: flex-start;
    border: 1px solid var(--border); border-radius: var(--r-md); background: var(--surface-sunken); padding: var(--sp-4); }
  .sl-chip { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 11.5px; color: var(--fg1);
    background: var(--surface); border: 1px solid var(--ok-500); border-radius: var(--r-sm); padding: 5px 9px; }
  .sl-chip .ic { color: var(--ok-500); }
  .sl-chip.is-wrong { border-color: var(--err-500); }
  .sl-chip.is-wrong .ic { color: var(--err-500); }
  .sl-hint { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg3); font-style: italic; }
  .sl-deck { margin-top: var(--sp-4); }
  .sl-card { display: inline-flex; align-items: center; gap: 9px; font-size: 13px; color: var(--fg1);
    border: 1px solid var(--border-strong); border-radius: var(--r-md); background: var(--surface); padding: 9px 13px; }
  .sl-card .ic { color: var(--accent); }
  .sl-why { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); padding-left: 9px; margin-left: 4px; border-left: 1px solid var(--border); }
  .sl-done { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 11.5px; color: var(--ok-500); }
  .sl-done .ic { color: var(--ok-500); }

  /* ---- STEP 03 · memory tool calls ---- */
  .mc-call { font-family: var(--font-mono); font-size: 11px; line-height: 1.5; display: flex; flex-wrap: wrap; align-items: center; gap: 2px;
    border: 1px solid var(--border); border-radius: var(--r-sm); background: var(--surface-sunken); padding: 7px 9px; }
  .mc-call-fn { display: inline-flex; align-items: center; gap: 5px; color: var(--fg2); }
  .mc-call-fn .ic { color: var(--accent); }
  .mc-call-arg { color: var(--concept-value); }
  .mc-call--read .mc-call-fn .ic { color: var(--accent); }
  .mc-call--write .mc-call-fn .ic { color: var(--ok-500); }
  .mc-call--update .mc-call-fn .ic { color: var(--warn-500); }

  /* ---- STEP 04 · curation ---- */
  .cu-list { display: flex; flex-direction: column; gap: 7px; }
  .cu-item { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; cursor: pointer;
    border: 1px solid var(--border); border-radius: var(--r-sm); background: var(--surface); padding: 8px 11px;
    font-family: inherit; transition: all var(--dur-3, .22s) var(--ease-standard); }
  .cu-item:hover { border-color: var(--border-strong); }
  .cu-box { display: grid; place-items: center; width: 18px; height: 18px; border-radius: var(--r-sm); border: 1px solid var(--border-strong); color: var(--fg3); flex: none; }
  .cu-item.is-kept { border-color: var(--accent); background: var(--accent-tint); }
  .cu-item.is-kept .cu-box { border-color: var(--accent); background: var(--accent); color: #fff; }
  .cu-item.is-bad { border-color: var(--err-500); }
  .cu-label { flex: 1; font-size: 13px; color: var(--fg1); }
  .cu-tag { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .05em; text-transform: uppercase; padding: 3px 7px; border-radius: var(--r-pill); }
  .cu-tag--keep { color: var(--ok-500); background: var(--ok-tint); }
  .cu-tag--drop { color: var(--fg3); background: var(--surface-sunken); }
  .cu-meter { display: flex; align-items: center; gap: 10px; margin-top: var(--sp-4); }
  .cu-pitfall { margin-top: var(--sp-5); border: 1px solid var(--warn-500); border-radius: var(--r-md); background: var(--warn-tint); padding: var(--sp-4); }
  .cu-pitfall-h { margin: 0 0 var(--sp-3); display: flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 11px;
    letter-spacing: .04em; text-transform: uppercase; color: var(--warn-500); }
  .cu-stale { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
  .cu-stale .ic { color: var(--fg3); }
  .cu-stale-old, .cu-stale-new { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 11.5px;
    border-radius: var(--r-sm); padding: 5px 9px; border: 1px solid var(--border); background: var(--surface); }
  .cu-stale-old { color: var(--fg3); text-decoration: line-through; }
  .cu-stale-old .ic { color: var(--err-500); }
  .cu-stale-old em { font-style: normal; opacity: .8; text-decoration: none; }
  .cu-stale-new { color: var(--fg1); border-color: var(--ok-500); }
  .cu-stale-new .ic { color: var(--ok-500); }
  .cu-stale-new em { font-style: normal; color: var(--fg3); }
  .cu-pitfall-note { margin: var(--sp-3) 0 0; font-size: 12.5px; color: var(--fg2); line-height: 1.5; }
  .cu-pitfall-note b { color: var(--fg1); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="text/babel" src="../lib/parts.jsx"></script>
  <script type="text/babel" src="reader.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="refs.jsx"></script>
  <script type="text/babel" src="../lib/diagrams.jsx"></script>
  <script type="text/babel" src="memory.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById("root")).render(
      <StepReader chapter={MEMORY_CH} section={SEC_CONTEXT} />
    );
  </script>
</body>
</html>
