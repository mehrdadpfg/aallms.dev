<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../lib/boot.js"></script>
<title>LLMs vs RLMs — aallms.dev</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../lib/colors_and_type.css">
<link rel="stylesheet" href="../lib/kit.css">
<link rel="stylesheet" href="reader.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: var(--bg); color: var(--fg1); font-family: var(--font-body); }
  .ic { color: currentColor; display: inline-flex; } .ic svg { display: block; }

  /* ---- bridge into reasoning models (step 03) ---- */
  .brg-flow { display: flex; align-items: stretch; gap: var(--sp-2); }
  .brg-node { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; padding: var(--sp-4) var(--sp-3); border: 1px solid var(--border); border-radius: var(--r-sm); background: var(--surface-sunken); text-align: center; }
  .brg-node-ic { display: inline-flex; color: var(--fg3); }
  .brg-node-lab { font-family: var(--font-mono); font-size: 10px; letter-spacing: .05em; text-transform: uppercase; color: var(--fg2); }
  .brg-node-sub { font-family: var(--font-mono); font-size: 9px; letter-spacing: .03em; color: var(--fg3); }
  .brg-think { border-color: var(--concept-output); background: var(--concept-output-tint, var(--surface-sunken)); }
  .brg-think .brg-node-ic { color: var(--concept-output); }
  .brg-arrow { display: flex; align-items: center; color: var(--fg3); }
  .brg-asks { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-3); margin-top: var(--sp-4); padding-top: var(--sp-4); border-top: 1px solid var(--border); }
  .brg-ask { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--fg2); }
  .brg-ask .ic { color: var(--accent); flex: none; margin-top: 2px; }
  @media (max-width: 560px) { .brg-flow { flex-direction: column; } .brg-arrow { justify-content: center; transform: rotate(90deg); } .brg-asks { grid-template-columns: 1fr; } }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="text/babel" src="../lib/parts.jsx"></script>
  <script type="text/babel" src="reader.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="refs.jsx"></script>
  <script type="text/babel" src="llms-vs-rlms.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById("root")).render(
      <StepReader chapter={LLMRLM} section={SEC_LLM} />
    );
  </script>
</body>
</html>
