<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../lib/boot.js"></script>
<title>Harness engineering — aallms.dev</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../lib/colors_and_type.css">
<link rel="stylesheet" href="../lib/kit.css">
<link rel="stylesheet" href="reader.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: var(--bg); color: var(--fg1); font-family: var(--font-body); }
  .ic { color: currentColor; display: inline-flex; } .ic svg { display: block; }

  /* ---- Step 1 · harness anatomy (model core + parts) ---- */
  .hax-diagram { display: flex; align-items: center; gap: var(--sp-5); flex-wrap: wrap; }
  .hax-core { flex: 0 0 132px; display: flex; flex-direction: column; align-items: center; gap: 3px; text-align: center;
    padding: 18px 12px; border-radius: var(--r-md); background: var(--accent-tint);
    border: 1.5px solid color-mix(in srgb, var(--accent) 45%, transparent); }
  .hax-core .ic { color: var(--accent); }
  .hax-core b { font-family: var(--font-body); font-size: 14px; color: var(--fg1); font-weight: 600; }
  .hax-core span { font-family: var(--font-mono); font-size: 10px; color: var(--fg2); }
  .hax-ring { flex: 0 0 auto; align-self: stretch; width: 2px; min-height: 120px;
    background: repeating-linear-gradient(180deg, var(--border-strong) 0 5px, transparent 5px 11px); border-radius: 2px; }
  .hax-parts { flex: 1; min-width: 220px; display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-3); }
  .hax-part { display: flex; align-items: center; gap: 9px;
    background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--r-sm); padding: 9px 11px; }
  .hax-chip { width: 28px; height: 28px; border-radius: var(--r-xs); flex: 0 0 28px; display: inline-flex; align-items: center; justify-content: center;
    background: var(--concept-output-tint); color: var(--concept-output); }
  .hax-part-txt { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .hax-part-txt b { font-family: var(--font-body); font-size: 13px; color: var(--fg1); font-weight: 600; }
  .hax-part-txt span { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg2); line-height: 1.35; }
  .hax-eq { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;
    margin-top: var(--sp-5); padding-top: var(--sp-4); border-top: 1px solid var(--border); }
  .hax-eq-term { font-family: var(--font-mono); font-size: 14px; font-weight: 600; border-radius: var(--r-sm); padding: 4px 12px; }
  .hax-eq-op { font-family: var(--font-mono); font-size: 15px; color: var(--fg3); }
  .hax-eq-agent { color: var(--accent); background: var(--accent-tint); }
  .hax-eq-model { color: var(--concept-key); background: var(--concept-key-tint); }
  .hax-eq-harness { color: var(--concept-output); background: var(--concept-output-tint); }
  @media (max-width: 640px) {
    .hax-ring { display: none; }
    .hax-parts { grid-template-columns: 1fr; }
  }

  /* ---- Step 3 · the environment the harness owns ---- */
  .hev-stage { display: flex; align-items: stretch; gap: var(--sp-5); padding: var(--sp-5); }
  .hev-world { flex: 0 0 248px; display: flex; flex-direction: column; gap: 8px;
    border: 1.5px solid color-mix(in srgb, var(--concept-output) 40%, transparent); border-radius: var(--r-md);
    background: var(--concept-output-tint); padding: var(--sp-4); }
  .hev-world-lab { font-family: var(--font-mono); font-size: 9px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--concept-output); }
  .hev-prims { display: flex; flex-direction: column; gap: 7px; }
  .hev-prim { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; text-align: left;
    background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--r-sm); padding: 8px 11px;
    cursor: pointer; transition: border-color var(--dur-2), background var(--dur-2), transform var(--dur-2); position: relative; }
  .hev-prim:hover { border-color: var(--concept-output); }
  .hev-prim.is-on { border-color: var(--concept-output); background: var(--surface);
    box-shadow: 0 0 0 1px var(--concept-output); transform: translateX(2px); }
  .hev-prim-ic { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--fg3); }
  .hev-prim.is-on .hev-prim-ic { color: var(--concept-output); }
  .hev-prim b { font-family: var(--font-body); font-size: 13px; color: var(--fg1); font-weight: 600; }
  .hev-prim-role { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg2); }
  .hev-model { display: flex; align-items: center; gap: 7px; margin-top: 2px;
    border: 1px dashed color-mix(in srgb, var(--accent) 50%, transparent); border-radius: var(--r-sm);
    background: var(--accent-tint); padding: 7px 10px; }
  .hev-model .ic { color: var(--accent); }
  .hev-model span { font-family: var(--font-mono); font-size: 10px; color: var(--fg1); }
  .hev-detail { flex: 1; display: flex; flex-direction: column; gap: 9px; align-self: center; }
  .hev-detail-head { display: flex; align-items: center; gap: 8px; }
  .hev-detail-head .ic { color: var(--concept-output); }
  .hev-detail-head b { font-family: var(--font-body); font-size: 16px; color: var(--fg1); font-weight: 600; }
  .hev-detail p { margin: 0; font-size: 14px; line-height: 1.6; color: var(--fg2); }
  @media (max-width: 640px) {
    .hev-stage { flex-direction: column; }
    .hev-world { flex: 1; }
  }

  /* ---- Step 4 · hooks & real harnesses ---- */
  /* the woven stack: two sub-panels joined by one seam */
  .hkr-stack { display: flex; flex-direction: column; gap: var(--sp-4); }
  .hkr-band { display: flex; align-items: center; }
  .hkr-band-lab { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .07em; text-transform: uppercase;
    color: var(--fg3); }
  .hkr-seam { display: flex; align-items: center; gap: var(--sp-3); margin: var(--sp-2) 0; color: var(--fg3); }
  .hkr-seam::before, .hkr-seam::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .hkr-seam span { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .07em; text-transform: uppercase; color: var(--fg3); white-space: nowrap; }

  /* hooks: inner plate + the loop rail with tappable hook points */
  .hk-plate { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: var(--sp-4); }
  .hk-rail { display: flex; align-items: flex-start; justify-content: space-between; gap: 4px; flex-wrap: nowrap; overflow-x: auto; }
  .hk-stagecol { display: flex; flex-direction: column; align-items: center; gap: 7px; flex: 1 1 0; min-width: 92px; }
  .hk-stage { display: flex; flex-direction: column; align-items: center; gap: 3px; text-align: center;
    padding: 8px 6px; width: 100%; border-radius: var(--r-sm); background: var(--bg);
    border: 1px solid var(--border-strong); }
  .hk-stage .ic { color: var(--fg2); }
  .hk-stage span { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg2); line-height: 1.3; }
  .hk-tap { display: inline-flex; align-items: center; gap: 5px; width: 100%; justify-content: center;
    padding: 5px 7px; border-radius: var(--r-xs); cursor: pointer; position: relative;
    background: var(--bg); border: 1px dashed var(--border-strong);
    transition: border-color var(--dur-2), background var(--dur-2), box-shadow var(--dur-2); }
  .hk-tap .ic { color: var(--fg3); }
  .hk-tap code { font-family: var(--font-mono); font-size: 9px; color: var(--fg3); white-space: nowrap; }
  .hk-tap:hover { border-color: var(--accent); }
  .hk-tap-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-strong); flex: 0 0 6px; }
  .hk-tap.is-on { border-style: solid; }
  .hk-tap.is-on.hk-ok { border-color: var(--ok-500); background: color-mix(in srgb, var(--ok-500) 11%, transparent); box-shadow: 0 0 0 1px var(--ok-500); }
  .hk-tap.is-on.hk-ok .hk-tap-dot, .hk-tap.is-on.hk-ok .ic { background: var(--ok-500); color: var(--ok-500); }
  .hk-tap.is-on.hk-ok code { color: var(--ok-500); }
  .hk-tap.is-on.hk-err { border-color: var(--err-500); background: color-mix(in srgb, var(--err-500) 11%, transparent); box-shadow: 0 0 0 1px var(--err-500); }
  .hk-tap.is-on.hk-err .hk-tap-dot, .hk-tap.is-on.hk-err .ic { background: var(--err-500); color: var(--err-500); }
  .hk-tap.is-on.hk-err code { color: var(--err-500); }
  .hk-tap.hk-empty { border: none; background: transparent; cursor: default; min-height: 1px; visibility: hidden; }
  .hk-arrow { display: flex; align-items: center; padding-top: 18px; color: var(--fg3); flex: 0 0 auto; }
  .hk-arrow .ic { color: var(--fg3); }

  .hk-out { margin-top: var(--sp-4); display: flex; flex-direction: column; gap: 7px; min-height: 56px; }
  .hk-idle { display: flex; align-items: center; gap: 8px; padding: 14px; border-radius: var(--r-sm);
    border: 1px dashed var(--border-strong); background: var(--bg);
    font-family: var(--font-mono); font-size: 11px; color: var(--fg3); }
  .hk-idle .ic { color: var(--fg3); }
  .hk-fire { display: flex; align-items: flex-start; gap: 9px; padding: 9px 11px; border-radius: var(--r-sm);
    background: var(--bg); border: 1px solid var(--border-strong); }
  .hk-fire-tag { font-family: var(--font-mono); font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: var(--r-xs);
    flex: 0 0 auto; align-self: flex-start; }
  .hk-fire-txt { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .hk-fire-txt b { font-family: var(--font-body); font-size: 13px; color: var(--fg1); font-weight: 600; }
  .hk-fire-txt span { font-size: 12.5px; line-height: 1.5; color: var(--fg2); }
  .hk-fire.hk-ok { border-left: 3px solid var(--ok-500); }
  .hk-fire.hk-ok .hk-fire-tag { color: var(--ok-500); background: color-mix(in srgb, var(--ok-500) 14%, transparent); }
  .hk-fire.hk-ok > .ic { color: var(--ok-500); margin-top: 1px; }
  .hk-fire.hk-err { border-left: 3px solid var(--err-500); }
  .hk-fire.hk-err .hk-fire-tag { color: var(--err-500); background: color-mix(in srgb, var(--err-500) 14%, transparent); }
  .hk-fire.hk-err > .ic { color: var(--err-500); margin-top: 1px; }

  /* real CLIs: inner plate, the three tools, then the mechanism grid */
  .hr-plate { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: var(--sp-4);
    display: flex; flex-direction: column; gap: var(--sp-4); }
  .hr-clis { display: flex; flex-direction: column; gap: 8px; }
  .hr-clis-lab { font-family: var(--font-mono); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: var(--concept-output); }
  .hr-cli-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .hr-cli { flex: 1 1 140px; display: flex; flex-direction: column; align-items: center; gap: 2px; text-align: center;
    padding: 10px 8px; border-radius: var(--r-sm); background: var(--concept-output-tint);
    border: 1px solid color-mix(in srgb, var(--concept-output) 35%, transparent); }
  .hr-cli .ic { color: var(--concept-output); }
  .hr-cli b { font-family: var(--font-body); font-size: 13px; color: var(--fg1); font-weight: 600; }
  .hr-cli span { font-family: var(--font-mono); font-size: 9px; color: var(--fg2); }
  .hr-clis-foot { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); }
  .hr-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
  .hr-mech { display: flex; align-items: center; gap: 8px; text-align: left;
    padding: 9px 10px; border-radius: var(--r-sm); cursor: pointer;
    background: var(--bg); border: 1px solid var(--border-strong);
    transition: border-color var(--dur-2), box-shadow var(--dur-2), background var(--dur-2); }
  .hr-mech:hover { border-color: var(--accent); }
  .hr-mech.is-on { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); background: var(--accent-tint); }
  .hr-mech-ic { width: 26px; height: 26px; border-radius: var(--r-xs); flex: 0 0 26px; display: inline-flex; align-items: center; justify-content: center;
    background: var(--surface); color: var(--fg2); }
  .hr-mech.is-on .hr-mech-ic { color: var(--accent); }
  .hr-mech b { font-family: var(--font-body); font-size: 12px; color: var(--fg1); font-weight: 600; line-height: 1.25; }
  .hr-detail { display: flex; align-items: flex-start; gap: 9px; padding: 11px 12px; border-radius: var(--r-sm);
    background: var(--bg); border: 1px solid var(--border-strong); border-left: 3px solid var(--accent); }
  .hr-detail > .ic { color: var(--accent); margin-top: 2px; flex: 0 0 auto; }
  .hr-detail p { margin: 0; font-size: 13.5px; line-height: 1.55; color: var(--fg2); }
  .hr-detail p b { color: var(--fg1); font-weight: 600; }
  @media (max-width: 640px) {
    .hr-grid { grid-template-columns: 1fr; }
    .hk-rail { gap: 2px; }
    .hk-stagecol { min-width: 80px; }
    .hk-tap code { font-size: 8px; }
  }

  /* ---- Step 3 · loop patterns (ReAct / plan-execute / reflection) ---- */
  .lp-stage { display: flex; flex-direction: column; gap: var(--sp-4); }
  .lp-blurb { margin: 0; font-size: 15px; line-height: 1.55; color: var(--fg2); }
  .lp-blurb b { color: var(--fg1); font-weight: 600; }
  .lp-flow { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; padding: var(--sp-3) 0; }
  .lp-node { display: flex; flex-direction: column; align-items: center; gap: 1px; text-align: center;
    flex: 0 0 auto; min-width: 92px; padding: 10px 12px; border-radius: var(--r-sm);
    background: var(--surface); border: 1.5px solid var(--border-strong); }
  .lp-node b { font-family: var(--font-body); font-size: 13px; color: var(--fg1); font-weight: 600; }
  .lp-node span { font-family: var(--font-mono); font-size: 9px; color: var(--fg2); }
  .lp-arrow { display: inline-flex; align-items: center; color: var(--fg3); }
  .lp-arrow .ic { color: var(--fg3); }
  .lp-return, .lp-once { display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .03em;
    padding: 5px 9px; border-radius: var(--r-xs); white-space: nowrap; }
  .lp-return { color: var(--accent); background: var(--accent-tint);
    border: 1px dashed color-mix(in srgb, var(--accent) 50%, transparent); }
  .lp-return .ic { color: var(--accent); }
  .lp-return--wide { flex-basis: 100%; justify-content: center; }
  .lp-once { color: var(--fg3); background: var(--bg); border: 1px solid var(--border-strong); }
  .lp-once .ic { color: var(--fg3); }
  .lp-lines { display: flex; flex-direction: column; gap: 7px; padding-top: var(--sp-3); border-top: 1px solid var(--border); }
  .lp-line { display: flex; align-items: flex-start; gap: 8px; font-size: 13.5px; line-height: 1.5; }
  .lp-line span { color: var(--fg2); }
  .lp-fit .ic { color: var(--ok-500); margin-top: 2px; flex: 0 0 auto; }
  .lp-trade .ic { color: var(--fg3); margin-top: 2px; flex: 0 0 auto; }

  /* ---- Step 6 · evals (fixed task suite, before→after) ---- */
  .ev-stage { display: flex; flex-direction: column; gap: var(--sp-4); }
  .ev-head { display: flex; align-items: center; justify-content: space-between; gap: var(--sp-3); flex-wrap: wrap; }
  .ev-suite-lab { display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--font-mono); font-size: 10px; letter-spacing: .05em; color: var(--fg2); }
  .ev-suite-lab .ic { color: var(--fg3); }
  .ev-score { font-family: var(--font-mono); font-size: 12px; color: var(--fg2); }
  .ev-score b { font-size: 16px; }
  .ev-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .ev-task { display: flex; align-items: center; gap: 8px; padding: 8px 11px; border-radius: var(--r-sm);
    background: var(--bg); border: 1px solid var(--border-strong); border-left-width: 3px;
    transition: border-color var(--dur-2), background var(--dur-2); }
  .ev-task .ic { flex: 0 0 auto; }
  .ev-task-lab { flex: 1; font-size: 13px; color: var(--fg1); min-width: 0; }
  .ev-task-state { font-family: var(--font-mono); font-size: 9px; letter-spacing: .06em; text-transform: uppercase; }
  .ev-task.is-pass { border-left-color: var(--ok-500); }
  .ev-task.is-pass .ic, .ev-task.is-pass .ev-task-state { color: var(--ok-500); }
  .ev-task.is-fail { border-left-color: var(--err-500); }
  .ev-task.is-fail .ic, .ev-task.is-fail .ev-task-state { color: var(--err-500); }
  .ev-task.is-changed { box-shadow: 0 0 0 1px currentColor; }
  .ev-task.is-pass.is-changed { box-shadow: 0 0 0 1px var(--ok-500); }
  .ev-task.is-fail.is-changed { box-shadow: 0 0 0 1px var(--err-500); }
  .ev-result { display: flex; align-items: center; gap: 9px; padding: 10px 12px; border-radius: var(--r-sm);
    background: var(--surface); border: 1px solid var(--border); }
  .ev-result .ic { color: var(--fg3); }
  .ev-result-lab { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .06em; text-transform: uppercase; color: var(--fg3); }
  .ev-before { font-family: var(--font-mono); font-size: 15px; font-weight: 600; color: var(--fg2); }
  .ev-after { font-family: var(--font-mono); font-size: 15px; font-weight: 600; color: var(--fg1); }
  .ev-after.is-up { color: var(--ok-500); }
  .ev-after.is-down { color: var(--err-500); }
  .ev-delta { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); margin-left: auto; }
  @media (max-width: 640px) {
    .ev-grid { grid-template-columns: 1fr; }
    .lp-node { min-width: 78px; flex: 1 1 78px; }
  }
</style>
</head>

  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="../lib/parts.jsx"></script>
  <script type="text/babel" src="reader.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>

    ReactDOM.createRoot(document.getElementById("root")).render(

  </script>
</body>
