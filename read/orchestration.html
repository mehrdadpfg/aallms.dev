<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../lib/boot.js"></script>
<title>Orchestration — aallms.dev</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../lib/colors_and_type.css">
<link rel="stylesheet" href="../lib/kit.css">
<link rel="stylesheet" href="reader.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: var(--bg); color: var(--fg1); font-family: var(--font-body); }
  .ic { color: currentColor; display: inline-flex; } .ic svg { display: block; }
  /* chapter-specific diagram styles go here */

  /* ===== 1 · OrchGraph — legend under the planner→synth diagram ===== */
  .orch-legend { display: flex; justify-content: center; gap: var(--sp-5);
    margin-top: var(--sp-2); padding-top: var(--sp-3);
    border-top: 1px solid var(--border); }
  .orch-legend span { display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--font-mono); font-size: 11px; color: var(--fg3); }
  .orch-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }

  /* ===== 2 · OrchSubAgents — main agent fanning out to sub-agents ===== */
  .sa-stage { display: grid; grid-template-columns: minmax(0,150px) 1fr;
    gap: var(--sp-5); align-items: center; }
  .sa-main { display: flex; flex-direction: column; align-items: flex-start;
    gap: 3px; padding: var(--sp-4); border-radius: var(--radius-2, 12px);
    border: 1px solid var(--border-strong); background: var(--accent-tint);
    transition: box-shadow .3s ease, border-color .3s ease; }
  .sa-main.is-live { border-color: color-mix(in srgb, var(--accent) 55%, var(--border-strong));
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 14%, transparent); }
  .sa-main-ic { display: inline-flex; color: var(--accent); margin-bottom: 2px; }
  .sa-main b { font-size: 14px; color: var(--fg1); }
  .sa-main-sub { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); }

  .sa-fan { display: flex; flex-direction: column; gap: var(--sp-3); }
  .sa-sub { position: relative; text-align: left; display: grid;
    grid-template-columns: 1fr auto; gap: 6px var(--sp-4); align-items: center;
    padding: var(--sp-3) var(--sp-4); border-radius: var(--radius-2, 12px);
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; opacity: 1; transform: translateX(0);
    transition: opacity .35s ease, transform .35s ease, border-color .2s ease, box-shadow .2s ease;
    font: inherit; color: inherit; }
  .sa-sub.is-in { opacity: 1; transform: translateX(0); }
  .sa-sub:not(.is-in) { opacity: .55; transform: translateX(-10px); }
  .sa-sub:hover { border-color: var(--accent); }
  .sa-sub.is-open { border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent); }
  .sa-sub-head { grid-column: 1; display: inline-flex; align-items: center; gap: 8px; }
  .sa-sub-ic { display: inline-flex; color: var(--concept-key);
    background: var(--concept-key-tint); border-radius: 6px; padding: 4px; }
  .sa-sub-head b { font-size: 13px; color: var(--fg1); }
  .sa-sub-role { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); }
  .sa-sub-ctx { grid-column: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .sa-ctx-lab { font-family: var(--font-mono); font-size: 9px; color: var(--fg3);
    text-transform: uppercase; letter-spacing: .04em; }
  .sa-ctx-bar { height: 5px; border-radius: 3px; background: var(--border);
    overflow: hidden; }
  .sa-ctx-bar i { display: block; height: 100%; border-radius: 3px;
    background: color-mix(in srgb, var(--concept-key) 70%, var(--accent)); }
  .sa-ctx-tok { font-family: var(--font-mono); font-size: 10px; color: var(--fg2); }
  .sa-sub-ret { grid-column: 2; grid-row: 1 / span 2; align-self: center;
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
    font-family: var(--font-mono); font-size: 10px; color: var(--concept-output);
    background: var(--concept-output-tint); border-radius: 999px;
    padding: 4px 9px; }

  .sa-peek { margin-top: var(--sp-4); padding-top: var(--sp-4);
    border-top: 1px solid var(--border); }
  .sa-peek.is-shown { display: grid; grid-template-columns: 1fr auto 1fr;
    gap: var(--sp-4); align-items: stretch; }
  .sa-peek-hint { font-size: 13px; color: var(--fg3); text-align: center;
    margin: 0; padding: var(--sp-2) 0; }
  .sa-peek-col { display: flex; flex-direction: column; gap: 7px;
    padding: var(--sp-3) var(--sp-4); border-radius: var(--radius-2, 12px);
    border: 1px solid var(--border); }
  .sa-peek-iso { background: color-mix(in srgb, var(--err-500) 6%, var(--surface));
    border-color: color-mix(in srgb, var(--err-500) 22%, var(--border)); }
  .sa-peek-back { background: var(--concept-output-tint);
    border-color: color-mix(in srgb, var(--concept-output) 30%, var(--border)); }
  .sa-peek-h { display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 10px; text-transform: uppercase;
    letter-spacing: .04em; color: var(--fg2); }
  .sa-peek-iso .sa-peek-h { color: var(--err-500); }
  .sa-peek-back .sa-peek-h { color: var(--concept-output); }
  .sa-peek-raw { list-style: none; margin: 0; padding: 0; display: flex;
    flex-direction: column; gap: 4px; }
  .sa-peek-raw li { font-family: var(--font-mono); font-size: 11px; color: var(--fg2);
    padding-left: 12px; position: relative; }
  .sa-peek-raw li::before { content: "·"; position: absolute; left: 2px; color: var(--fg3); }
  .sa-peek-sum { font-size: 13px; line-height: 1.55; color: var(--fg1); margin: 2px 0 0; }
  .sa-peek-tok { margin-top: auto; padding-top: 6px; font-family: var(--font-mono);
    font-size: 10px; color: var(--fg3); }
  .sa-peek-tok.is-small { color: var(--concept-output); }
  .sa-peek-arrow { display: flex; align-items: center; color: var(--fg3); }

  /* ===== 3 · OrchHive — shared blackboard / swarm ===== */
  .hv-stage { display: grid; grid-template-columns: minmax(0,170px) 1fr;
    gap: var(--sp-5); align-items: stretch; }
  .hv-ring { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-3);
    align-content: center; }
  .hv-agent { display: flex; flex-direction: column; align-items: flex-start;
    gap: 2px; padding: var(--sp-3); border-radius: var(--radius-2, 12px);
    border: 1px solid var(--border); background: var(--surface);
    transition: border-color .25s ease, box-shadow .25s ease, transform .25s ease; }
  .hv-agent.is-active { border-color: var(--accent); transform: translateY(-1px);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent); }
  .hv-agent-ic { display: inline-flex; border-radius: 7px; padding: 5px;
    margin-bottom: 2px; }
  .hv-agent b { font-size: 12.5px; color: var(--fg1); }
  .hv-agent-meta { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg3); }

  .hv-board { display: flex; flex-direction: column; min-width: 0;
    border-radius: var(--radius-2, 12px); border: 1px solid var(--border-strong);
    background: color-mix(in srgb, var(--accent) 4%, var(--surface)); overflow: hidden; }
  .hv-board-h { display: flex; align-items: center; gap: 7px;
    padding: var(--sp-2) var(--sp-3); border-bottom: 1px solid var(--border);
    font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase;
    letter-spacing: .04em; color: var(--fg2); }
  .hv-board-ic { display: inline-flex; color: var(--accent); }
  .hv-board-count { margin-left: auto; color: var(--fg3); text-transform: none;
    letter-spacing: 0; }
  .hv-board-body { display: flex; flex-direction: column; gap: 6px;
    padding: var(--sp-3); min-height: 180px; }
  .hv-empty { font-size: 13px; color: var(--fg3); margin: auto; text-align: center; }
  .hv-note { display: grid; grid-template-columns: auto 1fr; gap: 2px var(--sp-3);
    align-items: baseline; padding: 7px var(--sp-3) 7px var(--sp-2);
    border-left: 3px solid var(--border-strong); border-radius: 0 8px 8px 0;
    background: var(--surface); }
  .hv-note.is-new { animation: hv-pop .4s ease; }
  @keyframes hv-pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .hv-note-by { font-family: var(--font-mono); font-size: 10.5px; font-weight: 600;
    grid-column: 1; }
  .hv-note-build { grid-column: 2; display: inline-flex; align-items: center; gap: 4px;
    font-family: var(--font-mono); font-size: 9.5px; color: var(--fg3); }
  .hv-note-txt { grid-column: 1 / -1; font-size: 13px; line-height: 1.5; color: var(--fg1); }

  /* ===== 4 · OrchBFT — redundant agents + quorum vote ===== */
  .bft-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: var(--sp-2); }
  .bft-agent { display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: var(--sp-3) 4px; border-radius: var(--radius-2, 10px);
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; font: inherit; color: inherit;
    transition: border-color .2s ease, background .2s ease, box-shadow .2s ease; }
  .bft-agent.is-ok { border-color: color-mix(in srgb, var(--ok-500) 32%, var(--border)); }
  .bft-agent.is-ok:hover { box-shadow: 0 0 0 3px color-mix(in srgb, var(--ok-500) 12%, transparent); }
  .bft-agent.is-faulty { border-color: color-mix(in srgb, var(--err-500) 45%, var(--border));
    background: color-mix(in srgb, var(--err-500) 8%, var(--surface)); }
  .bft-agent.is-faulty:hover { box-shadow: 0 0 0 3px color-mix(in srgb, var(--err-500) 14%, transparent); }
  .bft-agent-ic { display: inline-flex; }
  .bft-agent.is-ok .bft-agent-ic { color: var(--ok-500); }
  .bft-agent.is-faulty .bft-agent-ic { color: var(--err-500); }
  .bft-agent-ans { font-family: var(--font-mono); font-size: 10px; color: var(--fg2);
    text-align: center; }
  .bft-agent-tag { font-family: var(--font-mono); font-size: 8.5px;
    text-transform: uppercase; letter-spacing: .04em; }
  .bft-agent.is-ok .bft-agent-tag { color: color-mix(in srgb, var(--ok-500) 80%, var(--fg3)); }
  .bft-agent.is-faulty .bft-agent-tag { color: var(--err-500); }

  .bft-quorum { display: grid; grid-template-columns: auto 1fr auto;
    gap: var(--sp-4); align-items: center; margin-top: var(--sp-4);
    padding-top: var(--sp-4); border-top: 1px solid var(--border); }
  .bft-q-ic { display: inline-flex; }
  .bft-q-tally { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .bft-q-row { display: grid; grid-template-columns: 64px 1fr auto; gap: var(--sp-3);
    align-items: center; }
  .bft-q-lab { font-family: var(--font-mono); font-size: 10.5px; }
  .bft-q-track { height: 7px; border-radius: 4px; background: var(--border); overflow: hidden; }
  .bft-q-track i { display: block; height: 100%; border-radius: 4px; transition: width .3s ease; }
  .bft-q-row b { font-family: var(--font-mono); font-size: 12px; color: var(--fg2); min-width: 14px; text-align: right; }
  .bft-q-out { text-align: right; display: flex; flex-direction: column; gap: 2px; }
  .bft-q-out-lab { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg3);
    text-transform: uppercase; letter-spacing: .04em; }
  .bft-q-out-val { font-family: var(--font-mono); font-size: 13px; }

  .bft-status { margin: var(--sp-4) 0 0; padding: var(--sp-3) var(--sp-4);
    border-radius: var(--radius-2, 10px); font-size: 13px; line-height: 1.5;
    border: 1px solid var(--border); }
  .bft-status.is-safe { color: var(--ok-500);
    background: color-mix(in srgb, var(--ok-500) 7%, var(--surface));
    border-color: color-mix(in srgb, var(--ok-500) 28%, var(--border)); }
  .bft-status.is-warn { color: var(--warn-500);
    background: color-mix(in srgb, var(--warn-500) 8%, var(--surface));
    border-color: color-mix(in srgb, var(--warn-500) 30%, var(--border)); }
  .bft-status.is-broken { color: var(--err-500);
    background: color-mix(in srgb, var(--err-500) 8%, var(--surface));
    border-color: color-mix(in srgb, var(--err-500) 32%, var(--border)); }
  .bft-hint { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg3); }

  /* ===== 5 · OrchMAD — multi-agent debate / Free-MAD ===== */
  .mad-q { display: flex; align-items: center; gap: var(--sp-3);
    padding: var(--sp-3) var(--sp-4); border-radius: var(--radius-2, 12px);
    border: 1px solid var(--border); background: var(--surface);
    margin-bottom: var(--sp-4); }
  .mad-q-ic { display: inline-flex; color: var(--accent); }
  .mad-q-txt { font-size: 14px; color: var(--fg1); font-weight: 500; }
  .mad-q-ans { margin-left: auto; font-family: var(--font-mono); font-size: 11px;
    color: var(--fg3); white-space: nowrap; }
  .mad-q-ans b { color: var(--ok-500); }

  .mad-roundbar { display: flex; align-items: baseline; gap: var(--sp-4);
    margin-bottom: var(--sp-3); flex-wrap: wrap; }
  .mad-round-lab { font-family: var(--font-mono); font-size: 11px; color: var(--fg3);
    display: inline-flex; align-items: center; gap: 7px; white-space: nowrap; }
  .mad-round-lab b { color: var(--fg1); }
  .mad-tag { font-style: normal; font-size: 9px; text-transform: uppercase;
    letter-spacing: .04em; padding: 2px 7px; border-radius: 999px; }
  .mad-tag-classic { color: var(--warn-500);
    background: color-mix(in srgb, var(--warn-500) 12%, transparent); }
  .mad-tag-free { color: var(--ok-500);
    background: color-mix(in srgb, var(--ok-500) 12%, transparent); }
  .mad-round-note { font-size: 12px; color: var(--fg2); font-style: italic; }

  .mad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--sp-3); }
  .mad-agent { display: flex; flex-direction: column; gap: 4px;
    padding: var(--sp-3); border-radius: var(--radius-2, 12px);
    border: 1px solid var(--border); background: var(--surface);
    transition: border-color .3s ease, box-shadow .3s ease, background .3s ease; }
  .mad-agent.is-right { border-color: color-mix(in srgb, var(--ok-500) 30%, var(--border)); }
  .mad-agent.is-wrong { border-color: color-mix(in srgb, var(--err-500) 38%, var(--border));
    background: color-mix(in srgb, var(--err-500) 7%, var(--surface)); }
  .mad-agent.is-changed { box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 10%, transparent);
    animation: mad-pop .4s ease; }
  @keyframes mad-pop { from { transform: translateY(5px); opacity: .4; } to { transform: none; opacity: 1; } }
  .mad-agent-top { display: flex; align-items: center; gap: 6px; }
  .mad-agent-ic { display: inline-flex; color: var(--fg3); }
  .mad-agent.is-right .mad-agent-ic { color: var(--ok-500); }
  .mad-agent.is-wrong .mad-agent-ic { color: var(--err-500); }
  .mad-agent-top b { font-size: 12px; color: var(--fg1); }
  .mad-flip { margin-left: auto; display: inline-flex; align-items: center; gap: 3px;
    font-family: var(--font-mono); font-size: 8.5px; text-transform: uppercase;
    letter-spacing: .03em; color: var(--fg3);
    padding: 2px 6px; border-radius: 999px; background: var(--border); }
  .mad-flip.is-bad { color: var(--err-500);
    background: color-mix(in srgb, var(--err-500) 14%, transparent); }
  .mad-flip.is-good { color: var(--ok-500);
    background: color-mix(in srgb, var(--ok-500) 14%, transparent); }
  .mad-agent-ans { font-family: var(--font-mono); font-size: 22px; font-weight: 600;
    color: var(--fg1); line-height: 1.1; }
  .mad-agent.is-right .mad-agent-ans { color: var(--ok-500); }
  .mad-agent.is-wrong .mad-agent-ans { color: var(--err-500); }
  .mad-agent-rs { font-size: 11px; font-weight: 400; color: var(--fg3); }
  .mad-agent-tag { font-family: var(--font-mono); font-size: 9px; color: var(--fg3);
    text-transform: uppercase; letter-spacing: .03em; }

  .mad-decide { display: grid; grid-template-columns: 1fr auto; gap: var(--sp-4);
    align-items: center; margin-top: var(--sp-4); padding-top: var(--sp-4);
    border-top: 1px solid var(--border); }
  .mad-decide-h { display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 11px; color: var(--fg1); }
  .mad-decide-sub { display: block; margin-top: 3px; font-size: 11.5px; color: var(--fg3); }
  .mad-decide-out { text-align: right; display: flex; flex-direction: column; gap: 1px; }
  .mad-decide-lab { font-family: var(--font-mono); font-size: 9px; color: var(--fg3);
    text-transform: uppercase; letter-spacing: .04em; }
  .mad-decide-val { font-family: var(--font-mono); font-size: 17px; }
  .mad-decide-verdict { font-family: var(--font-mono); font-size: 9.5px;
    text-transform: uppercase; letter-spacing: .04em; }

  .mad-meters { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-3);
    margin-top: var(--sp-4); }
  .mad-meter { display: flex; flex-direction: column; gap: 2px;
    padding: var(--sp-3) var(--sp-4); border-radius: var(--radius-2, 12px);
    border: 1px solid var(--border); background: var(--surface); }
  .mad-meter-lab { font-family: var(--font-mono); font-size: 9px; color: var(--fg3);
    text-transform: uppercase; letter-spacing: .04em; }
  .mad-meter-val { font-family: var(--font-mono); font-size: 14px; color: var(--fg1); }
  .mad-meter-sub { font-size: 11px; color: var(--fg3); }
  .mad-hint { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg3); }

  /* ===== 6 · OrchShapes — single loop / plan-execute / fan-out ===== */
  .sh-stage { display: flex; flex-direction: column; gap: var(--sp-4); }
  .sh-top { display: flex; align-items: center; justify-content: space-between;
    gap: var(--sp-4); }
  .sh-id { display: inline-flex; align-items: center; gap: var(--sp-3); }
  .sh-id-ic { display: inline-flex; color: var(--accent);
    background: var(--accent-tint); border-radius: 9px; padding: 8px; }
  .sh-id b { display: block; font-size: 15px; color: var(--fg1); }
  .sh-id-tag { font-family: var(--font-mono); font-size: 11px; color: var(--fg3); }
  .sh-sketch { width: 124px; height: 72px; flex: none; }
  .sh-node { stroke-width: 1.6; }
  .sh-ctrl { fill: var(--accent-tint);
    stroke: color-mix(in srgb, var(--accent) 60%, var(--border-strong)); }
  .sh-sub { fill: color-mix(in srgb, var(--concept-output) 10%, var(--surface));
    stroke: color-mix(in srgb, var(--concept-output) 45%, var(--border-strong)); }
  .sh-edge { fill: none; stroke: var(--border-strong); stroke-width: 1.5; }

  .sh-blurb { font-size: 14px; line-height: 1.6; color: var(--fg2); margin: 0;
    padding: var(--sp-3) 0; border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border); }

  .sh-bars { display: grid; gap: var(--sp-3); }
  .sh-bar { display: grid; grid-template-columns: minmax(0,180px) 1fr;
    gap: var(--sp-4); align-items: center; }
  .sh-bar-lab { font-size: 12px; color: var(--fg2); display: flex;
    flex-direction: column; gap: 1px; }
  .sh-bar-dir { font-family: var(--font-mono); font-size: 9px; font-style: normal;
    color: var(--fg3); }
  .sh-bar-track { height: 8px; border-radius: 4px; background: var(--border);
    overflow: hidden; }
  .sh-bar-track i { display: block; height: 100%; border-radius: 4px;
    transition: width .4s ease; }

  .sh-cols { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4); }
  .sh-col { display: flex; flex-direction: column; gap: 7px;
    padding: var(--sp-3) var(--sp-4); border-radius: var(--radius-2, 12px);
    border: 1px solid var(--border); background: var(--surface); }
  .sh-col-h { display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 10px; text-transform: uppercase;
    letter-spacing: .04em; }
  .sh-col-good { border-color: color-mix(in srgb, var(--ok-500) 26%, var(--border)); }
  .sh-col-good .sh-col-h { color: var(--ok-500); }
  .sh-col-cost { border-color: color-mix(in srgb, var(--warn-500) 26%, var(--border)); }
  .sh-col-cost .sh-col-h { color: var(--warn-500); }
  .sh-col ul { list-style: none; margin: 0; padding: 0; display: flex;
    flex-direction: column; gap: 4px; }
  .sh-col li { font-size: 12.5px; color: var(--fg2); padding-left: 13px;
    position: relative; }
