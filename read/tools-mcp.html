<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../lib/boot.js"></script>
<title>Tools & MCP — aallms.dev</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../lib/colors_and_type.css">
<link rel="stylesheet" href="../lib/kit.css">
<link rel="stylesheet" href="reader.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: var(--bg); color: var(--fg1); font-family: var(--font-body); }
  .ic { color: currentColor; display: inline-flex; } .ic svg { display: block; }

  /* ---- Tool design step (step 2) ---- */
  .td-stage { display: flex; flex-direction: column; gap: var(--sp-4); padding: var(--sp-5); }
  .td-task { display: flex; flex-direction: column; gap: 4px; padding: 10px 12px; border-radius: var(--r-sm);
    background: var(--accent-tint); border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent); }
  .td-task-lab { font-family: var(--font-mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); }
  .td-task code { font-family: var(--font-mono); font-size: 12.5px; color: var(--fg1); line-height: 1.5; }
  .td-tools { display: flex; flex-direction: column; gap: 7px; }
  .td-tool { display: flex; flex-direction: column; gap: 2px; padding: 8px 10px; border-radius: var(--r-sm);
    background: var(--surface); border: 1px solid var(--border-strong); transition: border-color var(--dur-2), background var(--dur-2); }
  .td-tool.is-pick { border-color: var(--ok-500); background: color-mix(in srgb, var(--ok-500) 12%, var(--surface)); box-shadow: 0 0 0 1px var(--ok-500); }
  .td-tool-sig { display: flex; align-items: center; gap: 7px; }
  .td-tool-sig .ic { color: var(--fg3); flex: 0 0 auto; }
  .td-tool.is-pick .td-tool-sig .ic { color: var(--ok-500); }
  .td-tool-name { font-family: var(--font-mono); font-size: 12.5px; font-weight: 600; color: var(--fg1); }
  .td-tool-params { font-family: var(--font-mono); font-size: 11px; color: var(--fg3); }
  .td-tool-note { font-family: var(--font-body); font-size: 11.5px; color: var(--fg2); padding-left: 20px; }
  .td-verdict { display: flex; align-items: center; gap: 8px; padding: 9px 11px; border-radius: var(--r-sm);
    font-size: 12.5px; line-height: 1.5; }
  .td-verdict .ic { flex: 0 0 auto; }
  .td-verdict b { font-weight: 600; }
  .td-verdict.is-ok { background: color-mix(in srgb, var(--ok-500) 12%, transparent); color: var(--fg2); border: 1px solid color-mix(in srgb, var(--ok-500) 40%, transparent); }
  .td-verdict.is-ok .ic, .td-verdict.is-ok b { color: var(--ok-500); }
  .td-verdict.is-bad { background: color-mix(in srgb, var(--warn-500) 12%, transparent); color: var(--fg2); border: 1px solid color-mix(in srgb, var(--warn-500) 40%, transparent); }
  .td-verdict.is-bad .ic, .td-verdict.is-bad b { color: var(--warn-500); }

  /* ---- Tools vs MCP diagram (step 3) — copied from _harness_seed ---- */
  .mcp-stage { display: flex; align-items: stretch; gap: var(--sp-5); padding: var(--sp-5); min-height: 210px; }
  .mcp-harness { flex: 0 0 116px; align-self: center; display: flex; flex-direction: column; align-items: center; gap: 3px; text-align: center;
    padding: 14px 10px; border-radius: var(--r-md); background: var(--accent-tint);
    border: 1.5px solid color-mix(in srgb, var(--accent) 45%, transparent); }
  .mcp-harness .ic { color: var(--accent); }
  .mcp-harness b { font-family: var(--font-body); font-size: 13px; color: var(--fg1); font-weight: 600; }
  .mcp-harness span { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg2); }

  .mcp-wired { flex: 1; position: relative; display: flex; flex-direction: column; justify-content: center; gap: 9px; padding-left: 22px; }
  .mcp-wired-rail { position: absolute; left: 10px; top: 12px; bottom: 12px; width: 2px; background: var(--border-strong); border-radius: 2px; }
  .mcp-wtool { position: relative; display: flex; align-items: center; gap: 9px;
    background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--r-sm); padding: 7px 10px; }
  .mcp-solder { position: absolute; left: -16px; top: 50%; width: 14px; height: 2px; background: var(--border-strong); transform: translateY(-50%); }
  .mcp-solder::before { content: ""; position: absolute; left: -4px; top: 50%; width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); transform: translate(-2px, -50%); box-shadow: 0 0 0 2px var(--plate-bg); }
  .mcp-chip { width: 26px; height: 26px; border-radius: var(--r-xs); flex: 0 0 26px; display: inline-flex; align-items: center; justify-content: center;
    background: var(--fill); color: var(--fg2); }
  .mcp-wtool code { font-family: var(--font-mono); font-size: 12px; color: var(--fg1); flex: 1; }
  .mcp-wlab { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--fg3);
    border: 1px dashed var(--border-strong); border-radius: var(--r-pill); padding: 1px 7px; }

  .mcp-net { flex: 1; display: flex; align-items: center; gap: var(--sp-4); }
  .mcp-link { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-family: var(--font-mono); font-size: 9.5px; color: var(--concept-key); }
  .mcp-link .ic { color: var(--concept-key); }
  .mcp-link::after { content: ""; display: block; width: 30px; height: 2px; margin-top: 2px;
    background: repeating-linear-gradient(90deg, var(--concept-key) 0 5px, transparent 5px 10px); border-radius: 2px; }
  .mcp-link.is-handshake .ic { animation: mcp-pulse 0.5s var(--ease-standard) infinite; }
  @keyframes mcp-pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  .mcp-servers { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .mcp-server { border: 1px solid color-mix(in srgb, var(--concept-key) 38%, transparent); border-radius: var(--r-sm);
    background: var(--concept-key-tint); padding: 7px 9px; }
  .mcp-server-head { display: flex; align-items: center; gap: 6px; }
  .mcp-server-head .ic { color: var(--concept-key); }
  .mcp-server-head b { font-family: var(--font-mono); font-size: 12px; color: var(--fg1); font-weight: 600; }
  .mcp-server-head .mcp-tag { margin-left: auto; font-family: var(--font-mono); font-size: 8.5px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--concept-key); }
  .mcp-socket { width: 9px; height: 9px; border-radius: 50%; border: 2px solid var(--concept-key); flex: 0 0 9px; }
  .mcp-toolset { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .mcp-toolset code { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg1);
    background: var(--surface); border: 1px solid color-mix(in srgb, var(--concept-key) 30%, var(--border)); border-radius: var(--r-xs); padding: 2px 6px; }
  .mcp-pop { opacity: 0; transform: translateY(4px) scale(.92); transition: opacity var(--dur-2) var(--ease-spring), transform var(--dur-2) var(--ease-spring); }
  .mcp-pop.is-in { opacity: 1; transform: none; }

  .mcp-readout { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4); margin-top: var(--sp-5); }
  .mcp-card { border: 1px solid var(--border); border-radius: var(--r-md); padding: var(--sp-4); background: var(--surface-sunken);
    transition: border-color var(--dur-2), background var(--dur-2); }
  .mcp-card.is-active { border-color: color-mix(in srgb, var(--accent) 45%, transparent); background: var(--surface); }
  .mcp-card-h { display: block; font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--fg3); margin-bottom: 5px; }
  .mcp-card.is-active .mcp-card-h { color: var(--accent); }
  .mcp-card p { margin: 0; font-size: 13px; line-height: 1.55; color: var(--fg2); }
  .mcp-card p b { font-weight: 600; }
  .mcp-ok { color: var(--ok-500); }
  .mcp-no { color: var(--warn-500); }

  /* ---- Tool vs MCP comparison (step 4) ---- */
  .tv-stage { display: flex; flex-direction: column; gap: var(--sp-4); padding: var(--sp-5); }
  .tv-grid { display: grid; grid-template-columns: minmax(86px, auto) 1fr 1fr; gap: 1px;
    background: var(--border); border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; }
  .tv-grid > div { background: var(--surface); padding: 9px 11px; display: flex; align-items: center; }
  .tv-head { font-family: var(--font-mono); font-size: 10px; letter-spacing: .06em; text-transform: uppercase; font-weight: 600;
    gap: 6px; background: var(--surface-sunken); }
  .tv-head .ic { flex: 0 0 auto; }
  .tv-col-b.tv-head { color: var(--fg1); }
  .tv-col-m.tv-head { color: var(--accent); }
  .tv-col-m.tv-head .ic { color: var(--accent); }
  .tv-dim { font-family: var(--font-mono); font-size: 11px; color: var(--fg3); background: var(--surface-sunken); }
  .tv-cell { font-size: 12.5px; line-height: 1.45; color: var(--fg2); }
  .tv-col-m.tv-cell { color: var(--fg1); }
  .tv-foot { display: flex; align-items: center; gap: 8px; padding: 9px 11px; border-radius: var(--r-sm);
    background: var(--accent-tint); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    font-size: 12.5px; line-height: 1.5; color: var(--fg2); }
  .tv-foot .ic { color: var(--accent); flex: 0 0 auto; }

  @media (max-width: 640px) {
    .mcp-stage { flex-direction: column; }
    .mcp-net { flex-direction: column; align-items: stretch; }
    .mcp-link { flex-direction: row; }
    .mcp-link::after { display: none; }
    .mcp-readout { grid-template-columns: 1fr; }
    .tv-grid { grid-template-columns: 1fr; }
    .tv-head.tv-dim { display: none; }
    .tv-dim { background: var(--accent-tint); color: var(--accent); font-weight: 600; }
  }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="text/babel" src="../lib/parts.jsx"></script>
  <script type="text/babel" src="reader.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="refs.jsx"></script>
  <script type="text/babel" src="tools-mcp.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById("root")).render(
      <StepReader chapter={TOOLSMCP_CH} section={SEC_HARNESS} />
    );
  </script>
</body>
</html>
